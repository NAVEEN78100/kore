name: Security Scan

on:
  push:
    branches: [dev, main]
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🔍 1. TruffleHog - Full Git History
      - name: TruffleHog (Git History)
        uses: trufflesecurity/trufflehog@main
        with:
          scan: git

      # 🔍 2. TruffleHog - Filesystem Scan
      - name: TruffleHog (Filesystem)
        uses: trufflesecurity/trufflehog@main
        with:
          scan: filesystem
          path: .

      # 🔍 3. Gitleaks (Extra layer)
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --verbose --redact
